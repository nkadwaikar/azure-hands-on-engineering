name: Bicep Validate

on:
  push:
    paths:
      - '**/*.bicep'
  pull_request:
    paths:
      - '**/*.bicep'

jobs:
  validate:
    name: Lint and validate Bicep templates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Install Bicep CLI
        run: az bicep install

      - name: Lint - Identity-First main
        run: az bicep build --file Identity-First/bicep/main.bicep

      - name: Lint - Identity-First modules
        run: |
          for f in Identity-First/bicep/modules/*.bicep; do
            echo "Linting $f"
            az bicep build --file "$f"
          done

      - name: Lint - Capstone templates
        run: |
          for f in Identity-First/capstone/architecture/bicep/**/*.bicep Identity-First/capstone/architecture/bicep/*.bicep; do
            [ -f "$f" ] || continue
            echo "Linting $f"
            az bicep build --file "$f"
          done
