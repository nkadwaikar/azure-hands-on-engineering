name: Clean Markdown Files

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  clean-md:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PowerShell
        run: |
          sudo apt-get update
          sudo apt-get install -y powershell

      - name: Run Markdown Cleanup
        shell: pwsh
        run: |
          $rules = @(
              @{ Name = "Unicode Emojis"; Pattern = "[\uD800-\uDBFF][\uDC00-\uDFFF]"; Replace = "" },
              @{ Name = "GitHub Emoji Codes"; Pattern = ":[a-zA-Z0-9_+\-]+:"; Replace = "" },
              @{ Name = "Fix Missing Space After #"; Pattern = "^(#{1,6})([^ \n#])"; Replace = '$1 $2' },
              @{ Name = "Normalize Double Spaces"; Pattern = " {2,}"; Replace = " " },
              @{ Name = "Normalize Heading Fragments"; Pattern = "[^a-zA-Z0-9\-\s]"; Replace = "" }
          )

          $files = Get-ChildItem -Recurse -Filter "*.md"
          $modified = 0

          foreach ($file in $files) {
              $original = Get-Content $file.FullName -Raw
              $updated = $original

              foreach ($rule in $rules) {
                  $updated = [regex]::Replace($updated, $rule.Pattern, $rule.Replace, "Multiline")
              }

              if ($updated -ne $original) {
                  Set-Content -Path $file.FullName -Value $updated -Encoding UTF8
                  Write-Host "Cleaned: $($file.FullName)"
                  $modified++
              }
          }

          Write-Host "Modified $modified file(s)."

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Automated Markdown cleanup"
          git push
