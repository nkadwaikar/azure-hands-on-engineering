name: Bicep Validate

on:
  push:
    paths:
      - 'Bicep/**.bicep'
  pull_request:
    paths:
      - 'Bicep/**.bicep'

jobs:
  validate:
    name: Lint and build Bicep files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Lint Bicep files
        run: |
          EXIT_CODE=0
          for file in $(find Bicep -name "*.bicep"); do
            echo "Linting: $file"
            az bicep lint --file "$file" 2>&1 || EXIT_CODE=1
          done
          exit $EXIT_CODE

      - name: Build Bicep files (syntax and type check)
        run: |
          mkdir -p /tmp/bicep-out
          EXIT_CODE=0
          for file in $(find Bicep -name "*.bicep"); do
            echo "Building: $file"
            az bicep build --file "$file" --outdir /tmp/bicep-out 2>&1 || EXIT_CODE=1
          done
          exit $EXIT_CODE

  what-if:
    name: What-if deployment check (main.bicep)
    runs-on: ubuntu-latest
    needs: validate
    # Skips automatically on forks and repos where Azure credentials are not configured
    if: vars.CI_RESOURCE_GROUP != ''
    permissions:
      id-token: write   # required for OIDC token exchange
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Azure (OIDC — no stored secrets)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: What-if — main.bicep
        # Sends main.bicep to ARM for server-side validation:
        # catches missing role definition IDs, invalid resource types,
        # and API version errors that compile-only checks miss.
        run: |
          az deployment group what-if \
            --resource-group "${{ vars.CI_RESOURCE_GROUP }}" \
            --template-file Bicep/main.bicep \
            --parameters workspaceId="${{ vars.CI_WORKSPACE_ID }}"
