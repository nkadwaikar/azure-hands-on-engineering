name: Bicep Validate

on:
  push:
    paths:
      - 'Bicep/**.bicep'
  pull_request:
    paths:
      - 'Bicep/**.bicep'

jobs:
  validate:
    name: Lint and build Bicep files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Lint Bicep files
        run: |
          EXIT_CODE=0
          for file in $(find Bicep -name "*.bicep"); do
            echo "Linting: $file"
            az bicep lint --file "$file" 2>&1 || EXIT_CODE=1
          done
          exit $EXIT_CODE

      - name: Build Bicep files (syntax and type check)
        run: |
          mkdir -p /tmp/bicep-out
          EXIT_CODE=0
          for file in $(find Bicep -name "*.bicep"); do
            echo "Building: $file"
            az bicep build --file "$file" --outdir /tmp/bicep-out 2>&1 || EXIT_CODE=1
          done
          exit $EXIT_CODE
